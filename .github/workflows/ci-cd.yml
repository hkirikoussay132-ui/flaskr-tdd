name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Flake8
        run: flake8 project/ tests/ --max-line-length=100 --extend-ignore=E302,E402

      - name: Format check with Black
        run: black --check project/ tests/

      - name: Run tests with coverage
        run: pytest --cov=project --cov-report=xml --cov-report=term

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.projectKey=hkirikoussay132-ui_flaskr-tdd
            -Dsonar.organization=hkirikoussay132-ui
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io